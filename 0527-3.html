<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用愛點亮心情 - 國小教師情緒教育互動網頁</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg-gradient-start: #ffe5ec; /* 粉紅泡泡背景漸層起點 */
            --bg-gradient-end: #ffc2d1;   /* 粉紅泡泡背景漸層終點 */
            --text-color: #4a4a4a;        /* 主要文字顏色 */
            --pink-primary: #ff7096;      /* 溫馨粉紅色 */
            --pink-dark: #ff477e;         /* 深粉紅色 */
            --green-primary: #2bcbba;     /* 溫暖綠色 */
            --gray-primary: #778ca3;      /* 冷漠灰色 */
            --blue-primary: #0984e3;      /* 憂鬱藍色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* 隱藏全網頁滾動條，保持畫面精美 */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            position: relative;
            transition: background 1s ease;
            color: var(--text-color);
        }

        /* 透過偽元素(::before)來實作平滑的背景顏色切換 (粉紅 <-> 憂鬱藍) */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); /* 難過的藍色漸層 */
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 0;
            pointer-events: none;
        }

        /* 當 body 被加上 .sad-bg-mode 時，藍色漸層會淡入顯示 */
        body.sad-bg-mode::before {
            opacity: 1;
        }

        /* ==========================================================================
           2. 動態背景粒子效果 (粉紅泡泡 / 藍色眼淚)
           ========================================================================== */
        .bubble-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 2; /* 位於背景色上方，內容下方 */
            pointer-events: none;
        }

        /* [幸福粉紅泡泡] 樣式與向上動畫 */
        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 50%;
            box-shadow: inset -5px -5px 15px rgba(255, 182, 193, 0.5),
                        inset 5px 5px 10px rgba(255, 255, 255, 0.8),
                        0 4px 10px rgba(255, 192, 203, 0.2);
            animation: floatUp 10s infinite linear;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-115vh) translateX(60px) rotate(360deg); opacity: 0; }
        }

        /* [難過藍色眼淚] 樣式與向下墜落動畫 */
        .tear-drop {
            position: absolute;
            top: -50px;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            /* 利用圓角比例製作精美的「水滴/眼淚」形狀 */
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            opacity: 0.6;
            box-shadow: 0 2px 6px rgba(9, 132, 227, 0.3);
            animation: fallDown 5s linear infinite;
        }

        @keyframes fallDown {
            0% { transform: translateY(0) rotate(45deg) scale(0.8); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(115vh) rotate(45deg) scale(1.1); opacity: 0; }
        }

        /* ==========================================================================
           3. 導覽列分頁設計 (Tab Navigation)
           ========================================================================== */
        .nav-container {
            z-index: 10;
            margin-top: 15px;
            margin-bottom: 5px;
            width: 100%;
            max-width: 800px;
            padding: 0 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.8);
            color: var(--pink-dark);
            padding: 10px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 700;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .tab-btn:hover, .tab-btn.active-tab {
            transform: translateY(-2px);
            background: white;
            border-color: var(--pink-primary);
        }

        body.sad-bg-mode .tab-btn { color: var(--blue-primary); }
        body.sad-bg-mode .tab-btn:hover, body.sad-bg-mode .tab-btn.active-tab { border-color: var(--blue-primary); }

        /* ==========================================================================
           4. 右上角幸福計分板
           ========================================================================== */
        .score-card {
            position: absolute;
            top: 20px;
            right: 25px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(255, 112, 150, 0.25);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--pink-dark);
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
            border: 2px solid white;
            transition: all 0.5s ease;
        }

        .score-card span {
            font-size: 1.6rem;
            font-weight: 900;
        }

        body.sad-bg-mode .score-card {
            color: var(--blue-primary);
            box-shadow: 0 10px 25px rgba(9, 132, 227, 0.25);
        }

        @media (max-width: 900px) {
            .score-card {
                position: relative;
                top: auto;
                right: auto;
                margin: 10px auto;
                display: inline-flex;
            }
        }

        /* ==========================================================================
           5. 分頁顯示控制
           ========================================================================== */
        .tab-content {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: calc(100vh - 120px);
            padding: 10px 20px;
            z-index: 5;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================================================
           6. 分頁一：認識情緒
           ========================================================================== */
        .stage-layout {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 30px;
            align-items: center;
            height: 100%;
        }

        @media (max-width: 900px) {
            .stage-layout { grid-template-columns: 1fr; gap: 15px; }
            .sidebar-card { order: 2; }
            .center-card { order: 1; }
        }

        .sidebar-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .sidebar-title {
            font-size: 1.15rem;
            font-weight: 900;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .title-positive { color: #20bf6b; }
        .title-negative { color: #57606f; }

        .speech-bubble {
            background: white;
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-color);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            user-select: none;
            border: 2px solid transparent;
        }

        .bubble-positive { border-color: #e3faf2; border-left: 6px solid var(--green-primary); }
        .bubble-positive:hover { transform: translateY(-3px) scale(1.03); background: #f0fdf4; box-shadow: 0 10px 20px rgba(43, 203, 186, 0.2); }
        
        .bubble-negative { border-color: #f1f2f6; border-left: 6px solid var(--gray-primary); }
        .bubble-negative:hover { transform: translateY(-3px) scale(1.03); background: #f5f6fa; box-shadow: 0 10px 20px rgba(119, 140, 163, 0.2); }

        .speech-bubble:active { transform: translateY(1px) scale(0.98); }

        @keyframes popBubble {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .pop-active { animation: popBubble 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); }

        /* 中央角色區樣式 */
        .center-card {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 3px dashed white;
        }
    </style>
</head>
<body>

    <div class="bubble-container" id="bubbleContainer"></div>

    <div class="score-card">
        💖 幸福指數: <span id="scoreDisplay">0</span>
    </div>

    <div class="nav-container">
        <button class="tab-btn active-tab" onclick="switchTab('tab1', this)">💬 語句魔法</button>
        <button class="tab-btn" onclick="switchTab('tab2', this)">🎨 情緒畫布</button>
        <button class="tab-btn" onclick="switchTab('tab3', this)">👩‍🏫 教師專區</button>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="stage-layout">
            
            <div class="sidebar-card">
                <div class="sidebar-title title-positive">☀️ 溫暖的話語</div>
                <div class="speech-bubble bubble-positive" onclick="updateScore(10, this)">「你做得很棒了喔！」</div>
                <div class="speech-bubble bubble-positive" onclick="updateScore(10, this)">「沒關係，我們慢慢來。」</div>
                <div class="speech-bubble bubble-positive" onclick="updateScore(10, this)">「我會在這裡陪你。」</div>
                <div class="speech-bubble bubble-positive" onclick="updateScore(10, this)">「需要幫忙隨時告訴我。」</div>
            </div>

            <div class="center-card">
                <h1 class="text-3xl font-black text-gray-700 mb-4" id="mainTitle">用愛點亮心情</h1>
                <p class="text-lg text-gray-600 mb-6" id="mainDesc">點擊左右兩邊的對話框，看看不同的話語會對心情造成什麼影響吧！</p>
                <div class="text-7xl mb-4 transition-transform duration-300 hover:scale-110" id="emotionFace">😊</div>
            </div>

            <div class="sidebar-card">
                <div class="sidebar-title title-negative">🌧️ 冷漠的話語</div>
                <div class="speech-bubble bubble-negative" onclick="updateScore(-10, this)">「你怎麼又弄錯了？」</div>
                <div class="speech-bubble bubble-negative" onclick="updateScore(-10, this)">「快一點好不好！」</div>
                <div class="speech-bubble bubble-negative" onclick="updateScore(-10, this)">「這很簡單吧，有什麼好哭的。」</div>
                <div class="speech-bubble bubble-negative" onclick="updateScore(-10, this)">「我不想聽你解釋。」</div>
            </div>

        </div>
    </div>

    <div id="tab2" class="tab-content">
        <div class="flex items-center justify-center h-full">
            <div class="bg-white/70 p-10 rounded-3xl text-center border-2 border-white shadow-xl">
                <h2 class="text-2xl font-bold text-gray-700 mb-4">🎨 這裡可以放學生的情緒畫作</h2>
                <p class="text-gray-500">未來可擴充畫板功能或畫作藝廊</p>
            </div>
        </div>
    </div>

    <div id="tab3" class="tab-content">
        <div class="flex items-center justify-center h-full">
            <div class="bg-white/70 p-10 rounded-3xl text-center border-2 border-white shadow-xl">
                <h2 class="text-2xl font-bold text-gray-700 mb-4">👩‍🏫 教材與教案下載區</h2>
                <p class="text-gray-500">提供老師下載空白學習單與課程引導手冊</p>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        //  1. 核心狀態與 DOM 節點綁定
        // ==========================================
        let score = 0;
        const scoreDisplay = document.getElementById('scoreDisplay');
        const body = document.body;
        const bubbleContainer = document.getElementById('bubbleContainer');
        const emotionFace = document.getElementById('emotionFace');
        const mainTitle = document.getElementById('mainTitle');
        const mainDesc = document.getElementById('mainDesc');

        // ==========================================
        //  2. 計分與背景轉換邏輯
        // ==========================================
        function updateScore(points, element) {
            score += points;
            scoreDisplay.innerText = score;

            // 觸發點擊的微動畫 (Pop效果)
            element.classList.remove('pop-active');
            void element.offsetWidth; // 觸發 reflow 重新啟動動畫
            element.classList.add('pop-active');

            // 判斷當前情緒狀態
            if (score < 0) {
                body.classList.add('sad-bg-mode');
                emotionFace.innerText = '😢';
                mainTitle.innerText = '心裡下雨了...';
                mainDesc.innerText = '冷漠的話語會讓人感到難過與孤單。';
            } else if (score >= 30) {
                body.classList.remove('sad-bg-mode');
                emotionFace.innerText = '🥰';
                mainTitle.innerText = '滿滿的愛與安全感！';
                mainDesc.innerText = '溫暖的話語能給予我們強大的力量。';
            } else {
                body.classList.remove('sad-bg-mode');
                emotionFace.innerText = '😊';
                mainTitle.innerText = '用愛點亮心情';
                mainDesc.innerText = '點擊左右兩邊的對話框，看看不同的話語會對心情造成什麼影響吧！';
            }
        }

        // ==========================================
        //  3. 分頁切換邏輯
        // ==========================================
        function switchTab(tabId, btnElement) {
            // 隱藏所有內容，顯示目標內容
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            // 處理按鈕 Active 狀態
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active-tab'));
            btnElement.classList.add('active-tab');
        }

        // ==========================================
        //  4. 動態生成背景粒子 (泡泡/眼淚)
        // ==========================================
        function createParticle() {
            const particle = document.createElement('div');
            
            // 隨機水平位置
            particle.style.left = Math.random() * 100 + 'vw';
            
            // 隨機大小 (15px ~ 35px)
            const size = Math.random() * 20 + 15;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';

            if (score < 0) {
                // 生成難過眼淚
                particle.className = 'tear-drop';
                // 眼淚掉落較快 (3~5秒)
                particle.style.animationDuration = (Math.random() * 2 + 3) + 's'; 
            } else {
                // 生成幸福泡泡
                particle.className = 'bubble';
                // 泡泡飄升較慢 (6~11秒)
                particle.style.animationDuration = (Math.random() * 5 + 6) + 's';
            }

            bubbleContainer.appendChild(particle);

            // 動畫結束後自動清除 DOM 節點，防止網頁變卡
            setTimeout(() => {
                particle.remove();
            }, 12000); 
        }

        // 每隔 1.2 秒生成一個新的粒子
        setInterval(createParticle, 1200);

        // 初始化時先產生幾個泡泡，讓畫面不至於太過空白
        for(let i=0; i<5; i++){
            setTimeout(createParticle, i * 300);
        }
    </script>
</body>
</html>
